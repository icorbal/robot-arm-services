rasim:
  url: "http://localhost:8100"

llm:
  provider: "openai"
  model: "gpt-5.4"
  api_key_env: "OPENAI_API_KEY"

executor:
  max_iterations: 10
  step_delay: 0.5

perception:
  mode: "camera"  # "camera" for LLM-based perception, "scene_state" for direct JSON
  image_width: 640
  image_height: 480
