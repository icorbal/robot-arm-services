rasim:
  url: "http://192.168.0.68:8100"

llm:
  provider: "openai"
  model: "gpt-5.4"
  api_key_env: "OPENAI_API_KEY"

executor:
  max_iterations: 10
  step_delay: 0.5

perception:
  mode: "camera"  # "camera" for stereo vision, "scene_state" for JSON (legacy)
  image_width: 640
  image_height: 480
